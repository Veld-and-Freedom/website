  <title>Veld and Freedom | Sustainable Clothing Made in South Africa</title>
  <meta name="description" content="Sustainably made, locally manufactured clothing inspired by the African wild. Built to last, designed to give back." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brown:     #3E2510;
      --brown-mid: #5C3D1E;
      --tan:       #C4A882;
      --sage:      #6B7D52;
      --sage-light:#8A9E68;
      --cream:     #F5EFE3;
      --cream-dark:#EDE0CC;
      --ink:       #2A1F14;
      --muted:     #7A6A58;
      --white:     #FDFAF5;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 4rem;
      transition: background 0.4s, box-shadow 0.4s;
    }
    nav.scrolled {
      background: rgba(245,239,227,0.96);
      box-shadow: 0 1px 0 rgba(62,37,16,0.12);
      backdrop-filter: blur(8px);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--white);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.4s;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    nav.scrolled .nav-logo { color: var(--brown); }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a {
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      transition: color 0.3s;
    }
    nav.scrolled .nav-links a { color: var(--muted); }
    .nav-links a:hover { color: var(--tan) !important; }

    /* ── HERO ── */
    .hero {
      position: relative;
      height: 100vh;
      min-height: 600px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(160deg, rgba(30,15,5,0.55) 0%, rgba(62,37,16,0.3) 50%, rgba(107,125,82,0.25) 100%),
        url('https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?w=1800&q=80&fit=crop') center/cover no-repeat;
      transform: scale(1.04);
      animation: heroZoom 18s ease-out forwards;
    }
    @keyframes heroZoom {
      from { transform: scale(1.04); }
      to   { transform: scale(1.0); }
    }
